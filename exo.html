<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X O</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
    font-size:3rem;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,120px);
    gap:10px;
}

.cell{
    width:120px;
    height:120px;
    background:white;
    border:none;
    border-radius:12px;
    font-size:3rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.cell:hover{
    transform:scale(1.05);
    background:#f0f0f0;
}

#status{
    margin-top:20px;
    color:white;
    font-size:1.5rem;
}

#reset{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#ff9800;
    color:white;
    font-size:1rem;
    cursor:pointer;
}

#reset:hover{
    background:#e68900;
}
</style>
</head>

<body>

<div class="container">
    <h1>Tic Tac Toe</h1>

    <div class="board">
        <button class="cell" onclick="play(0)"></button>
        <button class="cell" onclick="play(1)"></button>
        <button class="cell" onclick="play(2)"></button>

        <button class="cell" onclick="play(3)"></button>
        <button class="cell" onclick="play(4)"></button>
        <button class="cell" onclick="play(5)"></button>

        <button class="cell" onclick="play(6)"></button>
        <button class="cell" onclick="play(7)"></button>
        <button class="cell" onclick="play(8)"></button>
    </div>

    <p id="status">Player 1's Turn (X)</p>
    <button id="reset" onclick="resetGame()">Restart Game</button>
</div>

<script>
let currentPlayer = "X";
let gameOver = false;

const cells = document.querySelectorAll(".cell");

const winPatterns = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

function play(index){

    if(gameOver || cells[index].innerHTML !== ""){
        return;
    }

    cells[index].innerHTML = currentPlayer;

    if(checkWinner()){
        document.getElementById("status").innerHTML =
        (currentPlayer === "X" ? "Player 1 Wins! 🎉" : "Player 2 Wins! 🎉");
        gameOver = true;
        return;
    }

    if(checkDraw()){
        document.getElementById("status").innerHTML = "Match Draw!";
        gameOver = true;
        return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";

    document.getElementById("status").innerHTML =
    currentPlayer === "X"
    ? "Player 1's Turn (X)"
    : "Player 2's Turn (O)";
}

function checkWinner(){

    for(let pattern of winPatterns){

        let a = cells[pattern[0]].innerHTML;
        let b = cells[pattern[1]].innerHTML;
        let c = cells[pattern[2]].innerHTML;

        if(a !== "" && a === b && b === c){
            return true;
        }
    }

    return false;
}

function checkDraw(){

    for(let cell of cells){
        if(cell.innerHTML === ""){
            return false;
        }
    }

    return true;
}

function resetGame(){

    cells.forEach(cell => {
        cell.innerHTML = "";
    });

    currentPlayer = "X";
    gameOver = false;

    document.getElementById("status").innerHTML =
    "Player 1's Turn (X)";
}
</script>

</body>
</html>
